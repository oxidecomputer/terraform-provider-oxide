version: "2"

linters:
  default: standard
  enable:
    - godoclint
  disable:
    - errcheck
  settings:
    godoclint:
      default-rule-set: basic
      rules:
        - max-len
      options:
        max-len:
          length: 100

formatters:
  enable:
    - gofmt
    - golines
    - goimports
  settings:
    golines:
      max-len: 100
      shorten-comments: true
    goimports:
      local-prefixes:
        - github.com/oxidecomputer/terraform-provider-oxide

run:
  timeout: 5m
