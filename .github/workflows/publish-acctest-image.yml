name: publish acctest image

# Manual workflow to force-rebuild the acctest image.
# Normal builds are handled by build-test.yml which publishes images automatically.
on:
  workflow_dispatch:
    inputs:
      omicron-version:
        description: 'Omicron version (commit hash). Leave empty to use oxide.go VERSION_OMICRON.'
        required: false
        default: ''
      force-build:
        description: 'Force rebuild even if image exists'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/acctest-omicron-dev

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Determine omicron version
        id: version
        run: |
          if [[ -n "${{ inputs.omicron-version }}" ]]; then
            OMICRON_VERSION="${{ inputs.omicron-version }}"
          else
            OMICRON_VERSION=$(./acctest/omicron-version.sh)
          fi
          # Sanitize version for use as a tag (replace non-alphanumeric with _)
          IMAGE_TAG=$(echo "${OMICRON_VERSION}" | sed 's/[^[:alnum:]]/_/g')
          echo "omicron=${OMICRON_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Check if image exists
        id: check
        run: |
          if docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Clean up disk space
        if: steps.check.outputs.exists == 'false' || inputs.force-build
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Log in to GHCR
        if: steps.check.outputs.exists == 'false' || inputs.force-build
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false' || inputs.force-build
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.check.outputs.exists == 'false' || inputs.force-build
        uses: docker/build-push-action@v6
        with:
          context: acctest
          platforms: linux/amd64
          push: true
          build-args: |
            OMICRON_BRANCH=${{ steps.version.outputs.omicron }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
