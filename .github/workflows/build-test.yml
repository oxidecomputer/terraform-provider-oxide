name: build & test
on:
  push:
    branches:
      - main
      - '[0-9].[0-9]+'
      - 'rel/v*'
  pull_request:
  workflow_dispatch:
    inputs:
      omicron-version:
        description: 'Omicron version (commit hash or "main"). Leave empty to use oxide.go VERSION_OMICRON.'
        required: false
        default: ''
  schedule:
    # Cron jobs test against omicron main to catch breaking changes early.
    - cron: "25 7 * * *"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/acctest-omicron-dev

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: build
        run: make build
      - name: test
        run: make test
      - name: lint
        run: make lint

  # Determine which omicron version to use for acceptance tests.
  # - Cron jobs: use "main" to catch breaking changes early
  # - PR/push: use the version from oxide.go's VERSION_OMICRON (enables image caching)
  omicron-version:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.version.outputs.branch }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - id: version
        env:
          INPUT_VERSION: ${{ inputs.omicron-version }}
          IS_SCHEDULE: ${{ github.event_name == 'schedule' }}
        run: |
          if [[ -n "${INPUT_VERSION}" ]]; then
            OMICRON_VERSION="${INPUT_VERSION}"
          elif [[ "${IS_SCHEDULE}" == "true" ]]; then
            OMICRON_VERSION="main"
          else
            OMICRON_VERSION=$(./acctest/omicron-version.sh)
          fi
          # Sanitize version for use as a tag (replace non-alphanumeric with _)
          IMAGE_TAG=$(echo "${OMICRON_VERSION}" | sed 's/[^[:alnum:]]/_/g')
          echo "branch=${OMICRON_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

  # Build and push the acctest docker image before running acceptance tests.
  # This ensures the image is available in the registry for acceptance tests to pull.
  publish-image:
    needs: omicron-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Check if image exists
        id: check
        run: |
          if docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.omicron-version.outputs.tag }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Clean up disk space
        if: steps.check.outputs.exists == 'false'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Log in to GHCR
        if: steps.check.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: acctest
          platforms: linux/amd64
          push: true
          build-args: |
            OMICRON_BRANCH=${{ needs.omicron-version.outputs.branch }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.omicron-version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  acceptance:
    needs: [omicron-version, publish-image]
    uses: "./.github/workflows/acceptance-sim.yml"
    with:
      omicron-branch: ${{ needs.omicron-version.outputs.branch }}
